name: Build macOS App
on: [push, workflow_dispatch] # Allows you to trigger it manually

jobs:
  build:
    runs-on: macos-latest # This assigns an Apple cloud server to your build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build the App
        run: xcodebuild -scheme "YourAppName" -configuration Release

      - name: Upload App Artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-mac-app
          path: build/Release/YourAppName.app
